    <path d="M82 119C105.2 118.5 123.1 105 140 92" stroke="#2355D6" stroke-width="8" stroke-linecap="round"/>
    <circle cx="82" cy="119" r="8" fill="#14B8A6"/>
    <circle cx="140" cy="92" r="8" fill="#2355D6"/>
    <circle cx="157" cy="75" r="8" fill="#F97316"/>
    <path d="M124.1 63.8L132.1 85.9L154.2 93.9L132.1 101.9L124.1 124L116.1 101.9L94 93.9L116.1 85.9L124.1 63.8Z" fill="url(#sunGradient)"/>
