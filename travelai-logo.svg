  <g>
    <text x="238" y="103" fill="#0F172A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="800">Travel<tspan fill="#2355D6">AI</tspan></text>
    <text x="242" y="145" fill="#475569" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Smart trips, clear routes</text>
